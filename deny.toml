[graph]
targets = []
all-features = true

[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # rand 0.9.2 unsoundness with custom logger in rand::rng() — pulled in
    # via tungstenite -> async-tungstenite -> chromiumoxide. Does not apply
    # to our usage; revisit when upstream chain updates.
    "RUSTSEC-2026-0097",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "NCSA",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
