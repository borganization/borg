name = "outlook"
description = "Send and search emails via Microsoft Graph API"
runtime = "python"
entrypoint = "main.py"
timeout_ms = 30000

[sandbox]
network = true
fs_read = ["/etc/ssl"]
fs_write = []

[parameters]
type = "object"
[parameters.properties.action]
type = "string"
description = "Action: 'send', 'search', 'read', or 'test'"
[parameters.properties.to]
type = "string"
description = "Recipient email (for 'send')"
[parameters.properties.subject]
type = "string"
description = "Email subject (for 'send')"
[parameters.properties.body]
type = "string"
description = "Email body text (for 'send')"
[parameters.properties.query]
type = "string"
description = "Search query (for 'search')"
[parameters.properties.message_id]
type = "string"
description = "Message ID to read (for 'read')"
[parameters.properties.limit]
type = "integer"
description = "Max results for search (default 10)"
[parameters.required]
values = ["action"]
