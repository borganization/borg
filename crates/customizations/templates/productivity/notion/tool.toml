name = "notion"
description = "Query and create Notion pages and databases"
runtime = "python"
entrypoint = "main.py"
timeout_ms = 30000

[sandbox]
network = true
fs_read = ["/etc/ssl"]
fs_write = []

[parameters]
type = "object"
[parameters.properties.action]
type = "string"
description = "Action: 'search', 'create_page', 'read_page', 'query_db', or 'test'"
[parameters.properties.query]
type = "string"
description = "Search query (for 'search')"
[parameters.properties.title]
type = "string"
description = "Page title (for 'create_page')"
[parameters.properties.content]
type = "string"
description = "Page content in plain text (for 'create_page')"
[parameters.properties.parent_id]
type = "string"
description = "Parent page or database ID (for 'create_page' or 'query_db')"
[parameters.properties.page_id]
type = "string"
description = "Page ID to read (for 'read_page')"
[parameters.required]
values = ["action"]
