name = "linear"
description = "Manage Linear issues and projects"
runtime = "python"
entrypoint = "main.py"
timeout_ms = 30000

[sandbox]
network = true
fs_read = ["/etc/ssl"]
fs_write = []

[parameters]
type = "object"
[parameters.properties.action]
type = "string"
description = "Action: 'list', 'create', 'update', 'search', or 'test'"
[parameters.properties.title]
type = "string"
description = "Issue title (for 'create')"
[parameters.properties.description]
type = "string"
description = "Issue description (for 'create')"
[parameters.properties.team_id]
type = "string"
description = "Team ID (for 'create' and 'list')"
[parameters.properties.issue_id]
type = "string"
description = "Issue ID (for 'update')"
[parameters.properties.state]
type = "string"
description = "State name to set (for 'update', e.g. 'Done')"
[parameters.properties.query]
type = "string"
description = "Search query (for 'search')"
[parameters.required]
values = ["action"]
