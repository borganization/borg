name = "google-calendar"
description = "Manage Google Calendar events"
runtime = "python"
entrypoint = "main.py"
timeout_ms = 30000

[sandbox]
network = true
fs_read = ["/etc/ssl"]
fs_write = []

[parameters]
type = "object"
[parameters.properties.action]
type = "string"
description = "Action: 'list', 'create', 'delete', or 'test'"
[parameters.properties.summary]
type = "string"
description = "Event title (for 'create')"
[parameters.properties.start]
type = "string"
description = "Start time in ISO 8601 format (for 'create')"
[parameters.properties.end]
type = "string"
description = "End time in ISO 8601 format (for 'create')"
[parameters.properties.description]
type = "string"
description = "Event description (for 'create')"
[parameters.properties.event_id]
type = "string"
description = "Event ID (for 'delete')"
[parameters.properties.days]
type = "integer"
description = "Number of days ahead to list events (default 7)"
[parameters.required]
values = ["action"]
