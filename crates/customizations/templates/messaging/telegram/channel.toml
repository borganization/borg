name = "telegram"
description = "Telegram bot integration"
runtime = "python"

[scripts]
inbound = "parse_inbound.py"
outbound = "send_outbound.py"
verify = "verify.py"

[sandbox]
network = true
fs_read = ["/etc/ssl"]
fs_write = []

[auth]
token_env = "TELEGRAM_BOT_TOKEN"

[settings]
webhook_path = "/webhook/telegram"
timeout_ms = 15000
max_concurrent = 5
