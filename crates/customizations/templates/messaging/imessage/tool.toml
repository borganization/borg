name = "imessage"
description = "Send and read iMessages via AppleScript (macOS only)"
runtime = "bash"
entrypoint = "main.sh"
timeout_ms = 15000

[sandbox]
network = false
fs_read = []
fs_write = []

[parameters]
type = "object"
[parameters.properties.action]
type = "string"
description = "Action to perform: 'send' or 'read'"
[parameters.properties.to]
type = "string"
description = "Phone number or email to send to (for 'send' action)"
[parameters.properties.message]
type = "string"
description = "Message text to send (for 'send' action)"
[parameters.properties.limit]
type = "integer"
description = "Number of recent messages to read (for 'read' action, default 10)"
[parameters.required]
values = ["action"]
